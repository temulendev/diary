<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vomit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="midnight font-lora">

  <!-- Sidebar -->
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <div class="sidebar-trigger"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3>typeface</h3>
      <button class="font-option" data-font="lora">Lora</button>
      <button class="font-option" data-font="dm-mono">DM Mono</button>
      <button class="font-option" data-font="playfair">Playfair Display</button>
      <button class="font-option" data-font="comic-sans">Comic Sans</button>
      <button class="font-option" data-font="libre">Libre Baskerville</button>
    </div>

    <div class="sidebar-section">
      <h3>mood</h3>
      <div class="colorway-options">
        <div class="colorway-swatch" data-colorway="dusk" title="dusk"></div>
        <div class="colorway-swatch" data-colorway="midnight" title="midnight"></div>
        <div class="colorway-swatch" data-colorway="fog" title="fog"></div>
        <div class="colorway-swatch" data-colorway="paper" title="paper"></div>
        <div class="colorway-swatch" data-colorway="forest" title="forest"></div>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="sound-toggle" id="soundToggle">sound: off</button>
    </div>

    <div class="sidebar-section sidebar-nav">
      <a href="shop.html">shop</a>
    </div>

    <div class="sidebar-section sidebar-stats">
      streak: <span id="statStreak">0</span> days<br>
      prompts: <span id="statPrompts">0</span><br>
      points: <span id="statPoints">0</span>
    </div>
  </aside>

  <!-- Main Journal -->
  <div class="journal-wrapper">
    <div class="notebook-card theme-default" id="notebookCard">
      <div class="session-timer" id="sessionTimer">00:00</div>
      <div id="restoredNote" class="restored-note" style="display:none;"></div>
      <div class="writing-area">
        <div class="writing-area-inner" id="writingAreaInner">
          <div id="editor" contenteditable="true" spellcheck="false"></div>
        </div>
      </div>
      <div class="prompt-tracker">prompts accepted this session: <span id="promptCount">0</span></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
