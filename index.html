<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vomit — Journal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(-10px); }
      50% { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-10px); }
    }
  </style>
</head>
<body class="dusk font-lora">
  <div class="main-container">
    <!-- Sidebar toggle strip -->
    <div class="sidebar-toggle"></div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Typeface</div>
        <div class="font-options">
          <div class="font-option lora" data-font="lora">Lora</div>
          <div class="font-option dm-mono" data-font="dm-mono">DM Mono</div>
          <div class="font-option playfair" data-font="playfair">Playfair Display</div>
          <div class="font-option crimson" data-font="crimson">Crimson Pro</div>
          <div class="font-option baskerville" data-font="baskerville">Libre Baskerville</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Mood</div>
        <div class="colorway-options">
          <div class="colorway-swatch colorway-dusk" data-colorway="dusk"></div>
          <div class="colorway-swatch colorway-midnight" data-colorway="midnight"></div>
          <div class="colorway-swatch colorway-fog" data-colorway="fog"></div>
          <div class="colorway-swatch colorway-paper" data-colorway="paper"></div>
          <div class="colorway-swatch colorway-forest" data-colorway="forest"></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Stats</div>
        <div class="sidebar-stats">
          <div class="stat-line">
            <div class="stat-label">Streak</div>
            <div class="stat-value streak-value">0</div>
          </div>
          <div class="stat-line">
            <div class="stat-label">Prompts</div>
            <div class="stat-value prompts-value">0</div>
          </div>
          <div class="stat-line">
            <div class="stat-label">Points</div>
            <div class="stat-value points-value">0</div>
          </div>
        </div>
      </div>

      <div class="sidebar-nav">
        <a href="shop.html" class="nav-link">Shop</a>
      </div>

      <button class="sound-toggle">♪</button>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="notebook-card theme-default">
        <div class="session-timer">00:00</div>
        <div class="editor" contenteditable="true" spellcheck="false"></div>
        <div class="prompts-tracker">prompts accepted: 0</div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // Update sidebar stats
    function updateStats() {
      const streak = Data.getState('currentStreak');
      const prompts = Data.getState('promptsAccepted');
      const points = Data.getPoints();
      document.querySelector('.streak-value').textContent = streak;
      document.querySelector('.prompts-value').textContent = prompts;
      document.querySelector('.points-value').textContent = points;
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateStats();
      // Update stats when points change
      setInterval(updateStats, 5000);
    });
  </script>
</body>
</html>
